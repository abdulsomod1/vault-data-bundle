# =============================================
# VAULT DATA - Netlify Configuration
# Optimized for Next.js deployment
# =============================================

[build]
  # Build command for Next.js
  command = "npm run build"
  # Publish directory - Next.js exports to out
  publish = "out"
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

# =============================================
# REDIRECTS & REWRITES for Next.js
# =============================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =============================================
# HEADERS
# =============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    # Allow API calls
    Access-Control-Allow-Origin = "*"

# Cache headers for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =============================================
# CONTEXT - Production Environment
# =============================================

[context.production.environment]
  NEXT_PUBLIC_SUPABASE_URL = "https://rgwgximvzbllfhqowmwp.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY = ""  # Set this in Netlify dashboard

[context.production]
  environment = { NEXT_PUBLIC_SUPABASE_URL = "https://rgwgximvzbllfhqowmwp.supabase.co" }

# =============================================
# CONTEXT - Deploy Preview
# =============================================

